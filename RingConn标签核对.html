<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RingConn标签信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            padding: 12px;
        }

        .app-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 { font-size: 1.3rem; color: white; text-align: center; margin-bottom: 0.25rem; }
        .sub { text-align: center; color: #a0c4e8; margin-bottom: 1rem; font-size: 0.7rem; }

        .panel {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        
        .panel-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            background: #34495e;
            color: white;
            white-space: nowrap;
        }
        .panel-btn:hover { transform: translateY(-1px); background: #3d5a73; }
        .panel-btn.active { background: #f39c12; color: #2c3e50; box-shadow: 0 0 0 2px #ffd966; transform: scale(1.02); }

        .device-panel .device-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            background: #34495e;
        }
        .device-panel .device-btn.active {
            background: #f39c12;
            color: #2c3e50;
        }

        .color-panel {
            gap: 0.4rem;
        }
        .color-panel .panel-btn {
            padding: 0.35rem 0.7rem;
            font-size: 0.7rem;
        }

        .number-panel {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }
        .number-panel .panel-btn {
            text-align: center;
            padding: 0.35rem 0;
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .tags-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tag-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.8rem;
            padding: 0.5rem;
            overflow-x: auto;
        }

        .tag-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .tag-card {
            background: white;
            border-radius: 0.8rem;
            padding: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.5;
            overflow-x: auto;
            word-break: break-all;
            white-space: normal;
        }
        
        .brand-large {
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'Arial Black', 'Segoe UI Black', sans-serif;
            letter-spacing: 2px;
            color: #1a3a4e;
            line-height: 1.2;
            display: inline-block;
            vertical-align: middle;
        }
        
        .tag-line {
            white-space: nowrap;
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 0.7rem;
            overflow-x: auto;
        }
        
        .first-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .barcode-label-right {
            text-align: right;
            font-size: 0.7rem;
            font-family: 'Courier New', 'SF Mono', monospace;
        }
        .barcode-number-right {
            text-align: right;
            font-size: 0.7rem;
            font-family: 'Courier New', 'SF Mono', monospace;
            margin-top: 0.1rem;
            margin-bottom: 0.3rem;
        }
        .serial-right {
            text-align: right;
            margin-top: 0.3rem;
        }
        
        .mail-tag-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.2rem 0;
        }
        .mail-info-left {
            font-size: 0.75rem;
            font-weight: 500;
            color: #1a3a4e;
            white-space: nowrap;
            overflow-x: auto;
        }
        .mail-barcode-right {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        /* 手机端优化 */
        @media (max-width: 600px) {
            .mail-tag-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.2rem;
            }
            .mail-info-left {
                white-space: normal;
                word-break: break-word;
                font-size: 0.7rem;
            }
            .mail-barcode-right {
                white-space: normal;
                word-break: break-all;
                font-size: 0.6rem;
            }
        }
        
        .color-box-card {
            background: white;
            border-radius: 0.8rem;
            padding: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .color-box-line {
            margin: 0.2rem 0;
            white-space: nowrap;
        }
        
        /* RCA-02 彩盒标签专用样式 - 与其他标签保持一致 */
        .color-box-card-rca02 {
            background: white;
            border-radius: 0.8rem;
            padding: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .color-box-card-rca02 div {
            margin: 0.2rem 0;
            padding: 0;
        }
        
        @media (max-width: 600px) {
            .tag-line {
                white-space: normal;
                word-break: break-all;
            }
            .color-box-line {
                white-space: normal;
                word-break: break-all;
            }
        }

        .placeholder-tag {
            background: white;
            border-radius: 0.8rem;
            padding: 1rem;
            text-align: center;
            color: #999;
            font-style: italic;
            font-size: 0.8rem;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ccc;
        }

        .display-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            padding: 0.8rem;
            min-height: 300px;
        }
        .display-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e6ed;
            padding-bottom: 0.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 6px;
        }
        .display-header > span { font-size: 0.8rem; font-weight: 600; color: #1a3a4e; }
        .selection-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .tag-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: white;
        }
        .badge-device { background: #1e6f5c; }
        .badge-lang { background: #f39c12; color: #2c3e50; }
        .badge-color { background: #7f8c8d; }
        .badge-number { background: #e67e22; }

        .waiting-message {
            text-align: center;
            padding: 1.5rem;
            color: #e67e22;
            font-size: 0.9rem;
        }
        footer { margin-top: 0.8rem; text-align: center; font-size: 0.6rem; color: #8aaec2; }
        
        @media (min-width: 800px) {
            .tags-container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .tag-section {
                flex: 1;
                min-width: 280px;
            }
        }
        
        @media (min-width: 600px) {
            body { padding: 20px; }
            .app-container { padding: 1.5rem; }
            .panel-btn { padding: 0.5rem 1.2rem; font-size: 0.9rem; }
            .device-panel .device-btn { padding: 0.6rem 1.2rem; font-size: 1rem; }
            .color-panel .panel-btn { padding: 0.45rem 1rem; font-size: 0.85rem; }
            .number-panel { gap: 0.6rem; }
            .number-panel .panel-btn { padding: 0.45rem 0; font-size: 0.9rem; }
            .tag-card { padding: 1rem; font-size: 0.75rem; }
            .tag-line { font-size: 0.75rem; }
            .tag-title { font-size: 0.9rem; }
            .brand-large { font-size: 1.6rem; }
            .mail-info-left { font-size: 0.85rem; }
        }
        
        @media (max-width: 480px) {
            .number-panel { gap: 0.3rem; }
            .number-panel .panel-btn { padding: 0.3rem 0; font-size: 0.7rem; }
            .panel-btn { padding: 0.35rem 0.6rem; font-size: 0.7rem; }
            .device-panel .device-btn { padding: 0.35rem 0.6rem; font-size: 0.75rem; }
            .color-panel .panel-btn { padding: 0.3rem 0.5rem; font-size: 0.65rem; }
            .tag-card { padding: 0.6rem; }
            .tag-line { font-size: 0.55rem; white-space: normal; word-break: break-all; }
            .brand-large { font-size: 1.2rem; }
            .mail-info-left { font-size: 0.65rem; }
            .mail-barcode-right { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>🏷️ RingConn标签信息</h1>
    <div class="sub">选择型号 / 语言 / 颜色 / 尺寸 → 自动生成标签</div>

    <div class="panel device-panel">
        <button class="panel-btn device-btn" data-device="RCA-01">RCA-01</button>
        <button class="panel-btn device-btn" data-device="RCA-02">RCA-02</button>
        <button class="panel-btn device-btn" data-device="RCP-01">RCP-01</button>
    </div>

    <div class="panel lang-panel">
        <button class="panel-btn lang-btn" data-lang="zh">中文版</button>
        <button class="panel-btn lang-btn" data-lang="en">英文版</button>
        <button class="panel-btn lang-btn" data-lang="ja">日文版</button>
    </div>

    <div id="colorPanel" class="panel color-panel"></div>
    <div id="numberPanel" class="panel number-panel"></div>

    <div class="display-area">
        <div class="display-header">
            <span>📄 标签预览</span>
            <div class="selection-tags" id="selectionTags">
                <span class="tag-badge badge-device" id="activeDeviceTag">未选择</span>
                <span class="tag-badge badge-lang" id="activeLangTag">-</span>
                <span class="tag-badge badge-color" id="activeColorTag">-</span>
                <span class="tag-badge badge-number" id="activeNumberTag">-</span>
            </div>
        </div>
        <div id="dynamicContent">
            <div class="waiting-message">⏳ 请选择型号、语言、颜色、尺寸</div>
        </div>
    </div>
    <footer>尺寸 06-15 | 四个条件都满足后显示外箱标签、邮寄盒标签、彩盒标签</footer>
</div>

    let currentDevice = null;

        "RCP-01": ["磨砂黑", "耀阳金", "未来银", "缎光玫瑰金", "缎光银"]

        "磨砂黑": "B", "耀阳金": "G", "未来银": "S", "玫瑰金": "R",

    };

    const COLOR_ENGLISH = {
        "磨砂黑": "Matte Black", "耀阳金": "Royal Gold", "未来银": "Future Silver",
        "玫瑰金": "Rose Gold", "沙丘金": "Dune Gold", "太空银": "Galaxy Silver",
        "缎光玫瑰金": "Brushed Rose Gold", "缎光银": "Brushed Silver"

    const COLOR_JAPANESE_RCA01 = {
        "磨砂黑": "マットブラック", "耀阳金": "サンゴールド",
        "未来银": "未来銀", "玫瑰金": "ローズゴールド"

        "磨砂黑": "マットブラック", "耀阳金": "ロイヤルゴールド",
        "未来银": "フューチャーシルバー", "缎光玫瑰金": "ブラッシュドローズゴールド",
        "缎光银": "ブラッシュドシルバー"
    };

    function getProductName(device) {
        const names = {
            "RCA-01": "Gen 2 Smart Ring",
            "RCA-02": "Gen 2 Air Smart Ring",
            "RCP-01": "Gen 3 Smart Ring"
        };
        return names[device] || "Gen 3 Smart Ring";
    }

    function getFullDate() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        return `${year}${month}${day}`;
    }

    function getColorForOuterBox(device, color, lang) {
        if (lang === 'zh') return color;
        if (lang === 'en') return COLOR_ENGLISH[color] || color;
        if (lang === 'ja') return COLOR_ENGLISH[color] || color;
        return color;
    }

    function getColorForMail(device, color, lang) {
        if (lang === 'zh') return color;
        if (lang === 'en') return COLOR_ENGLISH[color] || color;
        if (lang === 'ja') {
            if (device === 'RCA-01') return COLOR_JAPANESE_RCA01[color] || color;
            if (device === 'RCP-01') return COLOR_JAPANESE_RCP01[color] || color;
            return color;
        }
        return color;
    }

    function getColorForColorBox(device, color, lang) {
        if (lang === 'zh') return color;
        if (lang === 'en') return COLOR_ENGLISH[color] || color;

            if (device === 'RCA-01') return COLOR_JAPANESE_RCA01[color] || color;
            if (device === 'RCP-01') return COLOR_JAPANESE_RCP01[color] || color;

        }
        return color;

    function getMailLabelPrefix(lang) {
        if (lang === 'zh') return '尺寸';
        if (lang === 'en') return 'Size';
        if (lang === 'ja') return 'サイズ';
        return 'Size';
    }

    function getColorCode(color) {
        return COLOR_CODE[color] || "X";
    }

    function formatSize(sizeNum) {
        const num = parseInt(sizeNum);
        return String(num).padStart(2, '0') + "#";

        return parseInt(sizeNum).toString();

    // RCA-02 彩盒标签
    function generateColorBoxTag_RCA02(device, sizeNum, color, barcode, lang) {
        const plainSize = parseInt(sizeNum).toString();
        let sizeDisplay = '';
        if (lang === 'zh') {
            sizeDisplay = `尺寸 ${plainSize.padStart(2, '0')}`;
        } else if (lang === 'en') {
            sizeDisplay = `Size ${plainSize.padStart(2, '0')}`;
        } else if (lang === 'ja') {
            sizeDisplay = `サイズ ${plainSize}`;
        }
        
        const colorDisplay = getColorForColorBox(device, color, lang);
        const colorCode = getColorCode(color);
        const snNumber = `RCA2XXXXXXXXXX${colorCode}${plainSize.padStart(2, '0')}`;
        const fullDate = getFullDate();
        const formattedDate = `${fullDate.slice(0,4)}.${fullDate.slice(4,6)}.${fullDate.slice(6,8)}`;
        
        const brand = "RCA-02";
        const separator = " | ";
        const firstLine = `${brand}${separator}${colorDisplay}${separator}${sizeDisplay}`;
        
        // 中文版：删除UPC行，加边框两行（与RCA-01样式一致）
        if (lang === 'zh') {
            const footerBox = `
                <div style="border:1px solid #333; padding:0.2rem 0.3rem; margin-top:0.5rem; display:inline-block; text-align:left;">
                    <div>合格证 已检验</div>
                    <div style="font-size:0.7rem;">日期：${formattedDate}</div>
                </div>
            `;
            return `
                <div class="color-box-card-rca02">
                    <div>${firstLine}</div>
                    <div>69码：${barcode}</div>
                    <div>SN: ${snNumber}</div>
                    <div>${footerBox.replace(/\n/g, '').replace(/\s+/g, ' ')}</div>
                </div>
            `;
        }
        
        // 日文版：删除UPC行
        if (lang === 'ja') {
            return `
                <div class="color-box-card-rca02">
                    <div>${firstLine}</div>
                    <div>69码：${barcode}</div>
                    <div>SN: ${snNumber}</div>
                </div>
            `;
        }
        
        // 英文版：保留UPC行
        const upcCode = getUPCCode(device, color, sizeNum);
        return `
            <div class="color-box-card-rca02">
                <div>${firstLine}</div>
                <div>69码：${barcode}</div>
                <div>SN: ${snNumber}</div>
                <div>UPC：${upcCode}</div>
            </div>
        `;
    }

    // 外箱标签
    function generateOuterBoxTag(device, sizeDisplay, productName, colorDisplay, barcode, fullDate, colorCode, lang) {
        const lotNo = `XXXX-XXXXXXXXXXXX`;
        const quantity = `XXPCS`;
        const serialNumber = `LongTech-${device}-${sizeDisplay}-${colorCode}-${fullDate}-XXXX`;
        
        // 日文版特殊处理
        if (lang === 'ja') {
            const modelCode = getModelCode(device, currentColor, currentNumber);
            const jaTitle = "             日文版";
            const modelLine = `Model: ${modelCode}`;
            
            return `
                <div class="tag-card">
                    <div class="first-line">
                        <span class="brand-large">RingConn</span>
                        <div class="barcode-label-right">外箱条码</div>
                    </div>
                    <div class="barcode-number-right">${barcode}</div>
                    <div class="tag-line">Product name: ${productName}</div>
                    <div class="tag-line">Product Model: ${device}</div>
                    <div class="tag-line">Production time: ${fullDate}</div>
                    <div class="tag-line">Lot No: ${lotNo}</div>
                    <div class="tag-line">Quantity: ${quantity}</div>
                    <div class="tag-line">Size: ${sizeDisplay}</div>
                    <div class="tag-line">Color: ${colorDisplay}</div>
                    <div class="tag-line">G.W: KG</div>
                    <div class="tag-line">N.W: KG</div>

        // 中文版和英文版
        return `
            <div class="tag-card">
                <div class="first-line">
                    <span class="brand-large">RingConn</span>
                    <div class="barcode-label-right">外箱条码</div>
                </div>
                <div class="barcode-number-right">${barcode}</div>
                <div class="tag-line">Product name: ${productName}</div>
                <div class="tag-line">Product Model: ${device}</div>
                <div class="tag-line">Production time: ${fullDate}</div>
                <div class="tag-line">Lot No: ${lotNo}</div>
                <div class="tag-line">Quantity: ${quantity}</div>
                <div class="tag-line">Size: ${sizeDisplay}</div>
                <div class="tag-line">Color: ${colorDisplay}</div>
                <div class="tag-line">G.W: KG</div>
                <div class="tag-line">N.W: KG</div>
                <div class="serial-right">${serialNumber}</div>
            </div>
        `;

    // 邮寄盒标签（条码单独一行）
    function generateMailBoxTag(device, sizeNum, color, barcode, lang) {
        const plainSize = getPlainSize(sizeNum);
        const colorForMail = getColorForMail(device, color, lang);
        const prefix = getMailLabelPrefix(lang);
        const fullDate = getFullDate();
        const yearMonth = fullDate.slice(0, 6);  // YYYYMM
        const dateSuffix = `(${yearMonth})`;
        const displayText = `${prefix} ${plainSize} ${colorForMail} ${dateSuffix}`;
        
        // 日文版需要增加型番行
        if (lang === 'ja') {
            const modelCode = getModelCode(device, color, sizeNum);
            return `
                <div class="tag-card">
                    <div class="mail-tag-row">
                        <span class="mail-info-left">型番：${modelCode}</span>
                    </div>
                    <div class="mail-tag-row">
                        <span class="mail-info-left">${displayText}</span>
                    </div>
                    <div class="mail-tag-row">
                        <span class="mail-barcode-right">${barcode}</span>
                    </div>
                </div>
            `;
        }
        
        // 中文版和英文版
        return `
            <div class="tag-card">
                <div class="mail-tag-row">
                    <span class="mail-info-left">${displayText}</span>
                </div>
                <div class="mail-tag-row">
                    <span class="mail-barcode-right">${barcode}</span>
                </div>
            </div>
        `;
    }

    function generateColorBoxTag(device, sizeNum, color, barcode, lang) {
        if (device === 'RCA-01') {
            return generateColorBoxTag_RCA01(device, sizeNum, color, barcode, lang);
        } else if (device === 'RCA-02') {
            return generateColorBoxTag_RCA02(device, sizeNum, color, barcode, lang);
        } else if (device === 'RCP-01') {
            return generateColorBoxTag_RCP01(device, sizeNum, color, barcode, lang);
        }
        return `<div class="placeholder-tag">🎁 彩盒标签<br>模板待提供</div>`;
    }

    function generateAllTags() {
        if (!currentDevice || !currentLang || !currentColor || !currentNumber) {
            return `<div class="waiting-message">⏳ 请选择型号、语言、颜色、尺寸</div>`;
        }
        
        const sizeNum = currentNumber;
        const sizeDisplay = formatSize(sizeNum);
        const productName = getProductName(currentDevice);
        const colorForOuterBox = getColorForOuterBox(currentDevice, currentColor, currentLang);
        const barcode = getBarcode(currentDevice, currentColor, currentNumber);
        const fullDate = getFullDate();
        const colorCode = getColorCode(currentColor);
        
        const outerBoxTag = generateOuterBoxTag(currentDevice, sizeDisplay, productName, colorForOuterBox, barcode, fullDate, colorCode, currentLang);
        const mailBoxTag = generateMailBoxTag(currentDevice, sizeNum, currentColor, barcode, currentLang);
        const colorBoxTag = generateColorBoxTag(currentDevice, sizeNum, currentColor, barcode, currentLang);
        
        return `
            <div class="tags-container">
                <div class="tag-section"><div class="tag-title">📦 外箱标签</div>${outerBoxTag}</div>
                <div class="tag-section"><div class="tag-title">📮 邮寄盒标签</div>${mailBoxTag}</div>
                <div class="tag-section"><div class="tag-title">🎁 彩盒标签</div>${colorBoxTag}</div>
            </div>
        `;
    }

    // DOM 元素
    const deviceBtns = document.querySelectorAll('.device-btn');
    const langBtns = document.querySelectorAll('.lang-btn');
    const colorPanel = document.getElementById('colorPanel');
    const numberPanel = document.getElementById('numberPanel');
    const dynamicDiv = document.getElementById('dynamicContent');
    const activeDeviceTag = document.getElementById('activeDeviceTag');
    const activeLangTag = document.getElementById('activeLangTag');
    const activeColorTag = document.getElementById('activeColorTag');
    const activeNumberTag = document.getElementById('activeNumberTag');

    function updateDisplay() { dynamicDiv.innerHTML = generateAllTags(); }

    function renderColorButtons() {
        if (!currentDevice) { colorPanel.innerHTML = '<span style="color:#888; padding:0.5rem;">请先选择设备</span>'; return; }
        const colors = DEVICE_COLORS[currentDevice];
        if (!colors) { colorPanel.innerHTML = ''; return; }
        colorPanel.innerHTML = colors.map(color => `<button class="panel-btn color-btn" data-color="${color}">${color}</button>`).join('');
        document.querySelectorAll('.color-btn').forEach(btn => btn.addEventListener('click', () => selectColor(btn.getAttribute('data-color'))));
        highlightColorButton();
    }

    function renderNumberButtons() {
        numberPanel.innerHTML = NUMBER_LIST.map(num => `<button class="panel-btn number-btn" data-number="${num}">${num}</button>`).join('');
        document.querySelectorAll('.number-btn').forEach(btn => btn.addEventListener('click', () => selectNumber(btn.getAttribute('data-number'))));
        highlightNumberButton();
    }

    function updateTags() {
        activeDeviceTag.textContent = currentDevice || '未选择';
        if (currentDevice === 'RCA-01') activeDeviceTag.style.background = '#1e6f5c';
        else if (currentDevice === 'RCA-02') activeDeviceTag.style.background = '#2c5f8a';
        else if (currentDevice === 'RCP-01') activeDeviceTag.style.background = '#8b5a2b';
        else activeDeviceTag.style.background = '#7f8c8d';
        const langMap = { zh: '中文版', en: '英文版', ja: '日文版' };
        activeLangTag.textContent = currentLang ? langMap[currentLang] : '-';
        activeColorTag.textContent = currentColor || '-';
        activeNumberTag.textContent = currentNumber || '-';
    }

    function highlightDeviceButton() { deviceBtns.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-device') === currentDevice)); }
    function highlightLangButton() { langBtns.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === currentLang)); }
    function highlightColorButton() { document.querySelectorAll('.color-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-color') === currentColor)); }
    function highlightNumberButton() { document.querySelectorAll('.number-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-number') === currentNumber)); }

    function selectDevice(device) {
        currentDevice = device;
        if (currentColor && DEVICE_COLORS[device] && !DEVICE_COLORS[device].includes(currentColor)) currentColor = null;
        renderColorButtons();
        updateTags();
        highlightDeviceButton();
        updateDisplay();
    }
    function selectLang(lang) { currentLang = lang; updateTags(); highlightLangButton(); updateDisplay(); }
    function selectColor(color) { currentColor = color; updateTags(); highlightColorButton(); updateDisplay(); }
    function selectNumber(number) { currentNumber = number; updateTags(); highlightNumberButton(); updateDisplay(); }

    deviceBtns.forEach(btn => btn.addEventListener('click', () => selectDevice(btn.getAttribute('data-device'))));
    langBtns.forEach(btn => btn.addEventListener('click', () => selectLang(btn.getAttribute('data-lang'))));
    
    renderNumberButtons();
    renderColorButtons();
    selectDevice('RCA-01');
    selectLang('zh');
</script>
</body>
</html>
